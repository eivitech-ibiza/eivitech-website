name: Apply staged Eivitech hero

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-staged-hero.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: apply-staged-eivitech-hero
  cancel-in-progress: false

jobs:
  replace-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Reconstruct and verify hero image
        shell: bash
        run: |
          set -euo pipefail
          TARGET="public/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp"
          cat .hero-upload/chunk*.b64 | base64 --decode > "$TARGET"
          echo "b9028c2a306bcb43deeea61ac6aec29c49f048975f9f20c7a0039d4bcd771232  $TARGET" | sha256sum --check --strict
          python <<'PY'
          from pathlib import Path
          from PIL import Image

          target = Path("public/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp")
          assert target.stat().st_size == 86052, target.stat().st_size
          with Image.open(target) as image:
              assert image.format == "WEBP", image.format
              assert image.size == (1672, 941), image.size
          print("Hero verified: WebP 1672x941, 86052 bytes")
          PY

      - name: Commit replacement and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          TARGET="public/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          git rm -r .hero-upload
          git rm .github/workflows/apply-staged-hero.yml
          git commit -m "Replace homepage hero with resized Google Drive image"
          git push origin HEAD:main

      - name: Verify official Eivitech logo
        shell: bash
        run: |
          set -euo pipefail
          test -f public/media/brand/eivitech-logo.svg
          test "$(wc -c < public/media/brand/eivitech-logo.svg | tr -d ' ')" = "34695"
          echo "cb3a8cdfcd5d5fc06fa35f62c934a9d5ec8979ed05de4b3476f15b0ac33457ba  public/media/brand/eivitech-logo.svg" | sha256sum --check --strict

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY || secrets.VITE_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_ALLOWED_ADMIN_EMAILS: ${{ vars.VITE_ALLOWED_ADMIN_EMAILS || vars.BOOTSTRAP_ADMIN_EMAILS || secrets.VITE_ALLOWED_ADMIN_EMAILS || secrets.BOOTSTRAP_ADMIN_EMAILS }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
          VITE_GA4_ID: ${{ vars.VITE_GA4_ID || secrets.VITE_GA4_ID }}
          VITE_GOOGLE_ADS_ID: ${{ vars.VITE_GOOGLE_ADS_ID || secrets.VITE_GOOGLE_ADS_ID }}
          VITE_GOOGLE_ADS_LEAD_LABEL: ${{ vars.VITE_GOOGLE_ADS_LEAD_LABEL || secrets.VITE_GOOGLE_ADS_LEAD_LABEL }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID || secrets.VITE_META_PIXEL_ID }}

      - name: Detect build output directory
        id: detect_output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then
            echo "path=build" >> "$GITHUB_OUTPUT"
          else
            echo "No build output directory found"
            exit 1
          fi

      - name: Verify built hero
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.detect_output.outputs.path }}"
          TARGET="$OUTPUT/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp"
          test -f "$OUTPUT/index.html" || test -f "$OUTPUT/index.htm"
          echo "b9028c2a306bcb43deeea61ac6aec29c49f048975f9f20c7a0039d4bcd771232  $TARGET" | sha256sum --check --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect_output.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
