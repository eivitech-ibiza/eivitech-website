name: Apply Ibiza Villa Value fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'fix/ibiza-villa-value-content'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dedicated branch
        uses: actions/checkout@v4
        with:
          ref: fix/ibiza-villa-value-content
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply location and metadata
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/projects.patch
          git apply /tmp/projects.patch
          git add src/data/projects.ts
          git commit -m "fix: set Ibiza Villa Value location to Cala Carbó"

      - name: Apply gallery caption mapping
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/captions.patch
          git apply /tmp/captions.patch
          git add src/data/projectCaptions.ts
          git commit -m "fix: align Ibiza Villa Value gallery captions"

      - name: Add gallery coverage test
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/test.patch
          git apply /tmp/test.patch
          git add scripts/ibiza-villa-value-gallery.test.mjs
          git commit -m "test: cover Ibiza Villa Value gallery captions"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://eivitech.com
          VITE_SITE_URL: https://eivitech.com

      - name: Push verified commits
        run: git push origin HEAD:fix/ibiza-villa-value-content
