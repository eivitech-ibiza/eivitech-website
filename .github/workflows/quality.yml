name: Quality and SEO gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate and apply Dutch localization
        if: ${{ hashFiles('src/lib/nlTranslations.generated.json') == '' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check argostranslate
          python scripts/generate-nl-translations.py
          python scripts/finalize-nl-translations.py
          git apply -p1 scripts/dutch-code.patch
          rm -f nl-translations.generated.json

      - name: Render branded social preview
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          mkdir -p public/media/social
          rsvg-convert \
            --format=png \
            --width=1200 \
            --height=630 \
            --output=public/media/social/eivitech-og-brand-preview-v1.png \
            assets/social/eivitech-og-brand-preview-v1.svg
          test -s public/media/social/eivitech-og-brand-preview-v1.png

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://eivitech.com
          VITE_SITE_URL: https://eivitech.com

      - name: Build CRM API
        run: |
          npm --prefix api install
          npm --prefix api run build

      - name: Verify SEO output
        run: npm run seo:check

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Commit generated Dutch localization
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/i18n.ts \
            src/lib/nlTranslations.ts \
            src/lib/nlTranslations.generated.json \
            src/lib/autoTranslate.ts \
            src/main.tsx \
            src/components/Footer.tsx \
            src/components/SEO.tsx \
            api/src/email.ts \
            scripts/dutch-localization.test.mjs
          if ! git diff --cached --quiet; then
            git commit -m "Add complete Dutch website localization"
            git push origin HEAD:${{ github.head_ref }}
          fi
