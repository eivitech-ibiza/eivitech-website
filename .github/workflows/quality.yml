name: Quality and SEO gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render branded social preview
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          mkdir -p public/media/social
          rsvg-convert \
            --format=png \
            --width=1200 \
            --height=630 \
            --output=public/media/social/eivitech-og-brand-preview-v1.png \
            assets/social/eivitech-og-brand-preview-v1.svg
          test -s public/media/social/eivitech-og-brand-preview-v1.png

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://eivitech.com
          VITE_SITE_URL: https://eivitech.com

      - name: Build CRM API
        run: |
          npm install --prefix api
          npm run build --prefix api

      - name: Verify SEO output
        run: npm run seo:check

      - name: Audit production dependencies
        run: npm run audit:prod
