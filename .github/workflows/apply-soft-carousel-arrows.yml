name: Apply soft carousel arrow style

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-style:
    if: github.head_ref == 'style/soft-carousel-arrows'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: style/soft-carousel-arrows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply minimal arrow styling change
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/CaseStudyTemplate.tsx')
          text = path.read_text()

          replacements = {
              'absolute left-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/50 bg-background/90 text-3xl leading-none text-foreground shadow-lg backdrop-blur-sm transition hover:bg-background focus:outline-none focus-visible:ring-2 focus-visible:ring-primary md:left-5 md:h-12 md:w-12':
              'absolute left-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/30 bg-black/15 text-3xl leading-none text-white shadow-sm backdrop-blur-md transition hover:bg-black/25 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/80 md:left-5 md:h-12 md:w-12',
              'absolute right-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/50 bg-background/90 text-3xl leading-none text-foreground shadow-lg backdrop-blur-sm transition hover:bg-background focus:outline-none focus-visible:ring-2 focus-visible:ring-primary md:right-5 md:h-12 md:w-12':
              'absolute right-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/30 bg-black/15 text-3xl leading-none text-white shadow-sm backdrop-blur-md transition hover:bg-black/25 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/80 md:right-5 md:h-12 md:w-12',
              'absolute left-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-3xl text-white transition hover:bg-black/75':
              'absolute left-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/20 bg-black/15 text-3xl text-white shadow-sm backdrop-blur-md transition hover:bg-black/25',
              'absolute right-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-3xl text-white transition hover:bg-black/75':
              'absolute right-3 top-1/2 z-10 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full border border-white/20 bg-black/15 text-3xl text-white shadow-sm backdrop-blur-md transition hover:bg-black/25',
          }

          changed = 0
          for old, new in replacements.items():
              count = text.count(old)
              if count == 1:
                  text = text.replace(old, new)
                  changed += 1
              elif count > 1:
                  raise SystemExit(f'Unexpected duplicate class string ({count} matches): {old}')

          if changed not in (0, 4):
              raise SystemExit(f'Expected 4 replacements or an already-applied file, got {changed}')

          if changed:
              path.write_text(text)
          PY

      - name: Commit style update
        run: |
          if git diff --quiet; then
            echo "Style already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/CaseStudyTemplate.tsx
          git commit -m "style: soften project carousel arrows"
          git push origin HEAD:style/soft-carousel-arrows
