name: Install official Eivitech logo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/install-official-logo.yml"
      - ".github/logo-install/**"

permissions:
  contents: write

jobs:
  install-logo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild official SVG
        shell: bash
        run: |
          set -euo pipefail
          cat .github/logo-install/eivitech-logo.svg.b64.part* \
            | base64 --decode \
            > public/media/brand/eivitech-logo.svg

          test "$(wc -c < public/media/brand/eivitech-logo.svg | tr -d ' ')" = "23135"
          echo "b7d4c1a0d29964f8b3af4a64fa7b45282fa1a8dd10f18416aa9a37332878c303  public/media/brand/eivitech-logo.svg" | sha256sum --check --strict
          grep -q '<svg' public/media/brand/eivitech-logo.svg

      - name: Commit logo and remove installer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/media/brand/eivitech-logo.svg
          git rm -r .github/logo-install
          git rm .github/workflows/install-official-logo.yml
          git commit -m "Replace site logo with official Eivitech SVG"
          git push
