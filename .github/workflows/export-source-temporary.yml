name: Export source temporarily

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload repository source
        uses: actions/upload-artifact@v4
        with:
          name: eivitech-source
          path: |
            .
            !node_modules
            !dist
          include-hidden-files: true
          if-no-files-found: error
