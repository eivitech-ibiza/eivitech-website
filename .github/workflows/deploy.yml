name: Deploy Eivitech preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python for one-time hero replacement
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Replace hero from Google Drive
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pillow
          curl --fail --location --retry 3 \
            "https://drive.usercontent.google.com/download?id=10bDfdIrr8ehVeNMvwMjeGkX4a2ZTjxV3&export=download&confirm=t" \
            --output /tmp/eivitech-new-hero.webp

          python <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("/tmp/eivitech-new-hero.webp")
          destination = Path("public/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp")
          target_width, target_height = 1672, 941
          target_ratio = target_width / target_height

          with Image.open(source) as original:
              image = original.convert("RGB")
              width, height = image.size
              current_ratio = width / height

              if current_ratio < target_ratio:
                  crop_height = round(width / target_ratio)
                  top = min(35, max(0, height - crop_height))
                  crop_box = (0, top, width, top + crop_height)
              else:
                  crop_width = round(height * target_ratio)
                  left = max(0, (width - crop_width) // 2)
                  crop_box = (left, 0, left + crop_width, height)

              result = image.crop(crop_box).resize(
                  (target_width, target_height),
                  Image.Resampling.LANCZOS,
              )
              result.save(destination, "WEBP", quality=88, method=6, optimize=True)

          with Image.open(destination) as check:
              if check.size != (target_width, target_height):
                  raise RuntimeError(f"Dimensioni finali errate: {check.size}")
              print(f"Hero pronta: {check.size[0]}x{check.size[1]} - {destination.stat().st_size} bytes")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/media/hero/eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp
          if ! git diff --cached --quiet; then
            git commit -m "Replace homepage hero with resized Casa Vadella image"
            git push origin main
          else
            echo "Hero già aggiornata."
          fi

      - name: Verify official Eivitech logo
        shell: bash
        run: |
          set -euo pipefail
          test -f public/media/brand/eivitech-logo.svg
          test "$(wc -c < public/media/brand/eivitech-logo.svg | tr -d ' ')" = "34695"
          echo "cb3a8cdfcd5d5fc06fa35f62c934a9d5ec8979ed05de4b3476f15b0ac33457ba  public/media/brand/eivitech-logo.svg" | sha256sum --check --strict
          grep -q '<svg' public/media/brand/eivitech-logo.svg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Clerk frontend auth. Prefer VITE_* variables; fall back to backend-style names if already configured in GitHub.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY || secrets.VITE_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_ALLOWED_ADMIN_EMAILS: ${{ vars.VITE_ALLOWED_ADMIN_EMAILS || vars.BOOTSTRAP_ADMIN_EMAILS || secrets.VITE_ALLOWED_ADMIN_EMAILS || secrets.BOOTSTRAP_ADMIN_EMAILS }}

          # Consent-aware advertising / analytics IDs.
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
          VITE_GA4_ID: ${{ vars.VITE_GA4_ID || secrets.VITE_GA4_ID }}
          VITE_GOOGLE_ADS_ID: ${{ vars.VITE_GOOGLE_ADS_ID || secrets.VITE_GOOGLE_ADS_ID }}
          VITE_GOOGLE_ADS_LEAD_LABEL: ${{ vars.VITE_GOOGLE_ADS_LEAD_LABEL || secrets.VITE_GOOGLE_ADS_LEAD_LABEL }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID || secrets.VITE_META_PIXEL_ID }}

      - name: Detect build output directory
        id: detect_output
        run: |
          if [ -d dist ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d build ]; then
            echo "path=build" >> $GITHUB_OUTPUT
          else
            echo "No build output found"
            ls -la
            exit 1
          fi

      - name: Verify build output
        run: |
          echo "Using output dir: ${{ steps.detect_output.outputs.path }}"
          test -d ${{ steps.detect_output.outputs.path }}
          test -f ${{ steps.detect_output.outputs.path }}/index.html || test -f ${{ steps.detect_output.outputs.path }}/index.htm
          test -f ${{ steps.detect_output.outputs.path }}/media/brand/eivitech-logo.svg
          ls -la ${{ steps.detect_output.outputs.path }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect_output.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
