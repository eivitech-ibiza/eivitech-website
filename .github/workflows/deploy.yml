name: Deploy Eivitech preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  HERO_DIRECTORY: media/hero
  HERO_ORIGINAL: eivitech-ibiza-ristrutturazione-villa-mediterranea-top-banner.webp

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify official Eivitech logo
        shell: bash
        run: |
          set -euo pipefail
          test -f public/media/brand/eivitech-logo.svg
          test "$(wc -c < public/media/brand/eivitech-logo.svg | tr -d ' ')" = "34695"
          echo "cb3a8cdfcd5d5fc06fa35f62c934a9d5ec8979ed05de4b3476f15b0ac33457ba  public/media/brand/eivitech-logo.svg" | sha256sum --check --strict
          grep -q '<svg' public/media/brand/eivitech-logo.svg

      - name: Verify homepage hero
        shell: bash
        run: |
          set -euo pipefail
          HERO="public/${HERO_DIRECTORY}/${HERO_ORIGINAL}"
          test -s "$HERO"
          echo "Homepage hero found: $HERO"
          sha256sum "$HERO"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY || secrets.VITE_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_ALLOWED_ADMIN_EMAILS: ${{ vars.VITE_ALLOWED_ADMIN_EMAILS || vars.BOOTSTRAP_ADMIN_EMAILS || secrets.VITE_ALLOWED_ADMIN_EMAILS || secrets.BOOTSTRAP_ADMIN_EMAILS }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
          VITE_GA4_ID: ${{ vars.VITE_GA4_ID || secrets.VITE_GA4_ID }}
          VITE_GOOGLE_ADS_ID: ${{ vars.VITE_GOOGLE_ADS_ID || secrets.VITE_GOOGLE_ADS_ID }}
          VITE_GOOGLE_ADS_LEAD_LABEL: ${{ vars.VITE_GOOGLE_ADS_LEAD_LABEL || secrets.VITE_GOOGLE_ADS_LEAD_LABEL }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID || secrets.VITE_META_PIXEL_ID }}

      - name: Detect build output directory
        id: detect_output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then
            echo "path=build" >> "$GITHUB_OUTPUT"
          else
            echo "No build output found"
            ls -la
            exit 1
          fi

      - name: Publish cache-busted homepage hero
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.detect_output.outputs.path }}"
          ORIGINAL_PATH="${OUTPUT}/${HERO_DIRECTORY}/${HERO_ORIGINAL}"
          SHORT_SHA="${GITHUB_SHA:0:12}"
          HERO_STEM="${HERO_ORIGINAL%.webp}"
          HERO_VERSIONED="${HERO_STEM}-${SHORT_SHA}.webp"
          VERSIONED_PATH="${OUTPUT}/${HERO_DIRECTORY}/${HERO_VERSIONED}"

          test -s "$ORIGINAL_PATH"
          cp "$ORIGINAL_PATH" "$VERSIONED_PATH"
          cmp --silent "$ORIGINAL_PATH" "$VERSIONED_PATH"

          mapfile -t BUNDLES < <(grep -RIl --include='*.js' "$HERO_ORIGINAL" "$OUTPUT" || true)
          if [ "${#BUNDLES[@]}" -eq 0 ]; then
            echo "Homepage hero reference not found in compiled JavaScript."
            exit 1
          fi

          for bundle in "${BUNDLES[@]}"; do
            sed -i "s/${HERO_ORIGINAL}/${HERO_VERSIONED}/g" "$bundle"
          done

          if grep -RIl --include='*.js' "$HERO_ORIGINAL" "$OUTPUT" >/dev/null; then
            echo "Old homepage hero reference is still present in compiled JavaScript."
            exit 1
          fi

          grep -RIl --include='*.js' "$HERO_VERSIONED" "$OUTPUT" >/dev/null
          test -s "$VERSIONED_PATH"
          echo "HERO_VERSIONED=$HERO_VERSIONED" >> "$GITHUB_ENV"
          echo "Published cache-busted hero: $HERO_VERSIONED"

      - name: Verify build output
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.detect_output.outputs.path }}"
          echo "Using output dir: $OUTPUT"
          test -d "$OUTPUT"
          test -f "$OUTPUT/index.html" || test -f "$OUTPUT/index.htm"
          test -f "$OUTPUT/media/brand/eivitech-logo.svg"
          test -s "$OUTPUT/${HERO_DIRECTORY}/${HERO_VERSIONED}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect_output.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
