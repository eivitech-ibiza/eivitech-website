name: Deploy Eivitech preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Detect build output directory
        id: detect_output
        run: |
          if [ -d dist ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d build ]; then
            echo "path=build" >> $GITHUB_OUTPUT
          else
            echo "No build output found"
            ls -la
            exit 1
          fi

      - name: Verify build output
        run: |
          echo "Using output dir: ${{ steps.detect_output.outputs.path }}"
          test -d ${{ steps.detect_output.outputs.path }}
          test -f ${{ steps.detect_output.outputs.path }}/index.html || test -f ${{ steps.detect_output.outputs.path }}/index.htm
          ls -la ${{ steps.detect_output.outputs.path }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect_output.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
